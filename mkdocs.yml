site_name: OSCAR DB MCP
site_description: Local MCP server for guarded access to Agentic Clinic and OSCAR EMR MariaDB databases.
site_url: https://rahulsharmaah.github.io/oscaremr-mcp/
repo_url: https://github.com/rahulsharmaah/oscaremr-mcp
repo_name: rahulsharmaah/oscaremr-mcp

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Overview: index.md
  - Installation: installation.md
  - Configuration: configuration.md
  - MCP Clients:
      - Codex: clients/codex.md
      - Claude Code: clients/claude-code.md
  - Tools: tools.md
  - WSL MariaDB Access: EXPOSE_OSCAR_WSL_MARIADB.md
  - Security: security.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true
